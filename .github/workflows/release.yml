name: Build IPK and attach to release

# Builds the single app+service IPK and uploads it as an asset on the release that
# triggered the run. Also runnable by hand against an existing tag.
on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag to build for and attach the IPK to (e.g. v1.2.0)
        required: true

permissions:
  contents: write   # needed to upload the IPK as a release asset

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TAG: ${{ github.event.release.tag_name || github.event.inputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # webOS CLI — provides ares-package (same tool as the local Homebrew one).
      - name: Install webOS ares-cli
        run: npm install -g @webosose/ares-cli

      # Make the packaged IPK's version match the release tag (strip a leading "v").
      # appinfo.json needs x.y.z; if the tag isn't that shape, keep the committed version.
      - name: Sync appinfo.json version to tag
        run: |
          VER="${TAG#v}"
          if echo "$VER" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            node -e "const fs=require('fs');const j=JSON.parse(fs.readFileSync('appinfo.json','utf8'));j.version='$VER';fs.writeFileSync('appinfo.json',JSON.stringify(j,null,4)+'\n');"
            echo "appinfo.json version set to $VER"
          else
            echo "tag '$TAG' is not x.y.z; keeping committed appinfo.json version"
          fi

      # package-ipk.sh runs build.sh first (installs ws, regenerates + bundles
      # sendspin-core.js), then ares-package -> dist/*.ipk.
      - name: Build IPK
        run: ./package-ipk.sh

      - name: Upload IPK to the release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" dist/*.ipk --clobber
