<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="data:,">
    <title>Sendspin Cinema TV</title>
    <script src="Vibrant.min.js"></script>
    <style>
        :root { --accent: #0084ff; --glass: rgba(255, 255, 255, 0.1); }
        body {
            background: #000; color: #fff; font-family: 'Inter', sans-serif;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; height: 100vh; margin: 0; overflow: hidden;
            cursor: none;
        }

        #bg-overlay {
            position: fixed; inset: -10%; background-size: cover;
            background-position: center; filter: blur(90px) brightness(0.2) saturate(1.2);
            z-index: -2; transition: background-image 1.5s ease;
        }
        #bg-vignette {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,1) 120%);
            z-index: -1;
        }

        /* Settings Gear Icon */
        #settings-trigger {
            position: fixed; top: -100px; right: 40px; z-index: 4000;
            width: 80px; height: 80px; cursor: pointer;
            transition: top 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            background: var(--glass); display: flex; justify-content: center; align-items: center;
            border-radius: 0 0 25px 25px; border: 1px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
        }
        #settings-trigger svg { width: 40px; height: 40px; fill: #fff; opacity: 0.7; }

        /* Connection pill (top-left) */
        #conn-pill {
            position: fixed; top: 30px; left: 40px; z-index: 4000;
            padding: 10px 22px; border-radius: 30px; font-size: 1.3rem;
            letter-spacing: 1px; text-transform: uppercase; background: var(--glass);
            border: 1px solid rgba(255,255,255,0.12); backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); opacity: 0; transition: opacity 0.4s;
            display: flex; align-items: center; gap: 10px;
        }
        body.show-ui #conn-pill { opacity: 0.85; }
        #conn-dot { width: 12px; height: 12px; border-radius: 50%; background: #888; }
        #conn-pill.ok #conn-dot { background: #2ecc71; box-shadow: 0 0 12px #2ecc71; }
        #conn-pill.warn #conn-dot { background: #f1c40f; box-shadow: 0 0 12px #f1c40f; }
        #conn-pill.err #conn-dot { background: #e74c3c; box-shadow: 0 0 12px #e74c3c; }

        /* Main Player UI */
        .cover-wrapper {
            width: 50vh; height: 50vh; margin-bottom: 30px;
            border-radius: 20px; overflow: hidden;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .info { text-align: center; max-width: 85vw; z-index: 5; display: flex; flex-direction: column; align-items: center; }

        h1, h2 { transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        h1 { font-size: 4.8rem; margin: 0; font-weight: 800; letter-spacing: -2px; line-height: 1.1; }
        h2 { color: rgba(255,255,255,0.6); font-size: 2.8rem; margin: 15px 0 0; font-weight: 300; }

        .progress-wrapper {
            width: 70vw; display: flex; align-items: center;
            gap: 25px; margin-bottom: 35px; opacity: 0;
            transform: translateY(20px); transition: all 0.5s ease;
        }
        .time-label { font-family: monospace; font-size: 1.4rem; color: rgba(255,255,255,0.5); min-width: 80px; }
        .progress-container { flex-grow: 1; height: 12px; background: rgba(255,255,255,0.1); border-radius: 10px; position: relative; }
        #progress-bar {
            position: absolute; left: 0; top: 0; height: 100%;
            background: var(--accent); width: 0%; border-radius: 10px;
            box-shadow: 0 0 30px var(--accent); transition: width 0.3s linear, background 1s ease;
        }

        /* Controls */
        #controls-container {
            position: fixed; bottom: -250px; left: 0; width: 100%;
            height: 250px; display: flex; justify-content: center;
            align-items: center; background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            transition: bottom 0.5s cubic-bezier(0.4, 0, 0.2, 1); z-index: 100;
        }
        .btn {
            background: var(--glass); border: 2px solid rgba(255,255,255,0.1);
            color: #fff; width: 110px; height: 110px; border-radius: 50%;
            margin: 0 30px; display: flex; justify-content: center;
            align-items: center; cursor: pointer; transition: 0.3s all;
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .btn svg { width: 50px; height: 50px; fill: #fff; }
        .btn:focus { background: var(--accent); transform: scale(1.2); border-color: #fff; box-shadow: 0 0 50px var(--accent); outline: none; }

        /* --- UI STATE: SHOW CONTROLS --- */
        body.show-ui #controls-container { bottom: 0; }
        body.show-ui #settings-trigger { top: 0; }
        body.show-ui .progress-wrapper { opacity: 1; transform: translateY(0); }

        /* Cinema Effect: Shrink and Blur background */
        body.show-ui h1, body.show-ui h2 {
            opacity: 0.15;
            filter: blur(10px);
            transform: scale(0.95);
        }
        body.show-ui .cover-wrapper {
            transform: translateY(-80px) scale(0.75);
            box-shadow: 0 10px 40px rgba(0,0,0,1);
        }

        /* Setup form overlay */
        #setup-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.98);
            z-index: 5000; display: none; flex-direction: column;
            justify-content: flex-start; align-items: center; backdrop-filter: blur(50px);
            overflow-y: auto; padding: 5vh 0 8vh;
        }
        .setup-title { font-size: 1.4rem; color: var(--accent); text-transform: uppercase; letter-spacing: 4px; margin-bottom: 6px; }
        .setup-heading { font-size: 2.2rem; font-weight: 700; margin: 0 0 18px; text-align: center; }

        #lan-hint {
            width: 60vw; max-width: 900px; margin: 0 0 18px; padding: 16px 22px;
            background: rgba(0,132,255,0.12); border: 1px solid rgba(0,132,255,0.35);
            border-radius: 14px; font-size: 1.3rem; line-height: 1.5; color: rgba(255,255,255,0.85);
        }
        #lan-url { color: var(--accent); font-family: monospace; }

        .form { display: flex; flex-direction: column; gap: 16px; width: 60vw; max-width: 900px; }
        .field { display: flex; flex-direction: column; gap: 6px; }
        label { font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,0.55); }
        input {
            background: rgba(255,255,255,0.06); border: none;
            border-bottom: 3px solid var(--accent); color: #fff;
            font-size: 2rem; text-align: left; width: 100%;
            padding: 12px 16px; outline: none; font-family: monospace;
            transition: all 0.25s; box-sizing: border-box;
        }
        input:focus { background: rgba(255,255,255,0.12); border-bottom-color: #fff; }
        input::placeholder { color: #555; }

        .scan { width: 100%; }
        #server-list { display: flex; flex-direction: column; gap: 10px; }
        .srv-item {
            padding: 14px 18px; background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.12);
            border-radius: 12px; cursor: pointer; transition: 0.2s; font-size: 1.5rem;
        }
        .srv-item b { display: block; }
        .srv-item span { color: rgba(255,255,255,0.5); font-size: 1.1rem; font-family: monospace; }
        .srv-item:focus { border-color: #fff; background: rgba(0,132,255,0.25); transform: scale(1.02); outline: none; }

        .actions { display: flex; gap: 24px; margin-top: 10px; }
        .action-btn {
            flex: 1; padding: 18px; font-size: 1.5rem; text-transform: uppercase;
            letter-spacing: 2px; border-radius: 14px; border: 2px solid rgba(255,255,255,0.15);
            background: var(--glass); color: #fff; cursor: pointer; transition: 0.25s;
        }
        .action-btn.primary { background: var(--accent); border-color: var(--accent); }
        .action-btn:focus { transform: scale(1.04); border-color: #fff; box-shadow: 0 0 40px var(--accent); outline: none; }

        #setup-status { margin: 22px 0 0; min-height: 1.4rem; width: 60vw; max-width: 900px; font-size: 1.3rem; letter-spacing: 1px; color: rgba(255,255,255,0.45); text-align: center; }
        #setup-status.err { color: #e74c3c; }
        #setup-status.ok { color: #2ecc71; }
    </style>
</head>
<body id="main-body">

    <div id="conn-pill"><span id="conn-dot"></span><span id="conn-text">Idle</span></div>

    <div id="settings-trigger" onclick="openSettings()">
        <svg viewBox="0 0 24 24"><path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.81,11.69,4.81,12c0,0.31,0.02,0.65,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/></svg>

    <script>
        // ----------------------------------------------------------- Luna bridge
        // This UI is a thin client of the background daemon
        // (com.sendspin.cinema.service): it never talks to Music Assistant
        // directly. The service holds the persistent, mixed-audio connection and
        // owns volume (stream-only, see service). We just push config + transport
        // commands and render the status it subscribes us to.
        var SERVICE = 'luna://com.sendspin.cinema.service/';
        var Bridge = window.PalmServiceBridge || window.webOSServiceBridge || null;

        function lunaCall(method, params, onResult) {
            if (!Bridge) { if (onResult) onResult({ returnValue: false, errorText: 'no Luna bridge (run on webOS)' }); return null; }
            try {
                var bridge = new Bridge();
                bridge.onservicecallback = function (raw) {
                    var res; try { res = JSON.parse(raw); } catch (e) { res = { returnValue: false, errorText: 'bad response' }; }
                    if (onResult) onResult(res);
                };
                bridge.call(SERVICE + method, JSON.stringify(params || {}));
                return bridge; // caller keeps it alive for subscriptions
            } catch (e) {
                if (onResult) onResult({ returnValue: false, errorText: String(e) });
                return null;
            }
        }

        // --------------------------------------------------------------- elements
        var titleEl = document.getElementById('title');
        var artistEl = document.getElementById('artist');
        var coverEl = document.getElementById('cover-art');
        var loaderEl = document.getElementById('loader');
        var bgEl = document.getElementById('bg-overlay');
        var progressBar = document.getElementById('progress-bar');
        var timeCurrent = document.getElementById('time-current');
        var timeTotal = document.getElementById('time-total');
        var playPath = document.getElementById('play-path');
        var connPill = document.getElementById('conn-pill');
        var connText = document.getElementById('conn-text');
        var setupOverlay = document.getElementById('setup-overlay');
        var setupStatus = document.getElementById('setup-status');

        var uiTimeout, isPlaying = false, statusBridge = null, lastArt = null;
        var lastStatus = null;       // most recent service snapshot (source of truth)
        var autoOpened = false;      // true when setup was opened because nothing is configured
        var decidedInitial = false;  // have we made the first show-setup-or-not decision?

        // ---------------------------------------------------------------- config
        // The service loses in-memory config when webOS idle-recycles it, so the
        // UI is the source of truth: persisted here, re-pushed on every launch.
        function loadCfg() {
            return {
                host: localStorage.getItem('ma_host') || '',
                port: localStorage.getItem('ma_port') || '',
                user: localStorage.getItem('ma_user') || '',
                pass: localStorage.getItem('ma_pass') || '',
                name: localStorage.getItem('ma_name') || 'Cinema TV'
            };
        }
        function hasCfg() { return !!localStorage.getItem('ma_host'); }

        // Combine host + optional port into the "server" string the service parses
        // (it accepts "host", "host:port", "http://host", "ws://host:port").
        function buildServer(host, port) {
            host = (host || '').trim().replace(/\/+$/, '');
            if (!host) { return ''; }
            if (port && String(port).trim()) {
                var bare = host.replace(/^\w+:\/\//, '');
                var hasPort = /:\d+($|\/)/.test(bare);
                if (!hasPort) { host = host + ':' + String(port).trim(); }
            }
            return host;
        }

        window.openSettings = function (auto) {
            autoOpened = !!auto;
            var c = loadCfg();
            // If this TV has no local config but the service is already configured
            // (e.g. set from the LAN page), prefill from the service snapshot.
            if (!hasCfg() && lastStatus && lastStatus.server) {
                c.host = lastStatus.server;
                c.user = lastStatus.username || '';
                c.name = lastStatus.playerName || c.name;
            }
            document.getElementById('input-host').value = c.host;
            document.getElementById('input-port').value = c.port;
            document.getElementById('input-user').value = c.user;
            document.getElementById('input-pass').value = c.pass;
            document.getElementById('input-name').value = c.name;
            var configured = hasCfg() || !!(lastStatus && lastStatus.server);
            document.getElementById('cancel-btn').style.display = configured ? 'block' : 'none';
            setupStatus.textContent = '';
            setupStatus.className = '';
            setupOverlay.style.display = 'flex';
            document.getElementById('input-host').focus();
        };

        window.closeSettings = function () { setupOverlay.style.display = 'none'; autoOpened = false; };

        window.saveSetup = function () {
            var host = document.getElementById('input-host').value.trim();
            var port = document.getElementById('input-port').value.trim();
            var user = document.getElementById('input-user').value.trim();
            var pass = document.getElementById('input-pass').value;
            var name = document.getElementById('input-name').value.trim() || 'Cinema TV';
            if (!host) {
                setupStatus.textContent = 'Enter a server URL or IP';
                setupStatus.className = 'err';
                document.getElementById('input-host').focus();
                return;
            }
            localStorage.setItem('ma_host', host);
            localStorage.setItem('ma_port', port);
            localStorage.setItem('ma_user', user);
            localStorage.setItem('ma_pass', pass);
            localStorage.setItem('ma_name', name);

            setupStatus.textContent = 'Connecting…';
            setupStatus.className = '';
            applyConfig(function (res) {
                if (res && res.returnValue !== false) {
                    setupStatus.textContent = 'Saved. Connecting to Music Assistant…';
                    setupStatus.className = 'ok';
                    setTimeout(closeSettings, 900);
                } else {
                    setupStatus.textContent = 'Service error: ' + ((res && (res.errorText || res.reason)) || 'unknown');
                    setupStatus.className = 'err';
                }
            });
        };

        // ----------------------------------------------------- mDNS server scan
        // Ask the service to discover Music Assistant servers on the LAN and offer
        // them as a pick-list so the IP never has to be typed on the remote.
        window.scanServers = function () {
            var list = document.getElementById('server-list');
            var btn = document.getElementById('scan-btn');
            btn.textContent = '🔍 Scanning…';
            setupStatus.textContent = ''; setupStatus.className = '';
            lunaCall('discover', { timeoutMs: 3000 }, function (res) {
                btn.textContent = '🔍 Scan for servers';
                list.innerHTML = '';
                var servers = (res && res.servers) || [];
                if (!servers.length) {
                    setupStatus.textContent = 'No servers found — enter the address manually.';
                    setupStatus.className = 'err';
                    return;
                }
                servers.forEach(function (sv) {
                    var el = document.createElement('div');
                    el.className = 'srv-item';
                    el.tabIndex = 0;
                    el.innerHTML = '<b>' + (sv.name || 'Music Assistant') + '</b><span>' +
                        (sv.url || '') + (sv.version ? (' · v' + sv.version) : '') + '</span>';
                    el.onclick = function () { pickServer(sv); };
                    list.appendChild(el);
                });
                setupStatus.textContent = servers.length + ' found — pick one (OK), or scroll down to type.';
                setupStatus.className = 'ok';
                refreshFocusRing();
                servers.length && list.firstChild.focus();
            });
        };

        function pickServer(sv) {
            try {
                var u = new URL(sv.url);
                document.getElementById('input-host').value = u.protocol + '//' + u.hostname;
                document.getElementById('input-port').value = u.port || '';
            } catch (e) {
                document.getElementById('input-host').value = sv.url || '';
            }
            setupStatus.textContent = 'Selected ' + (sv.name || sv.url) + ' — press Save.';
            setupStatus.className = 'ok';
            document.getElementById('save-btn').focus();
        }

        // Push the persisted config to the service: name first, then server+creds.
        function applyConfig(done) {
            var c = loadCfg();
            lunaCall('setPlayerName', { playerName: c.name }, function () {
                lunaCall('setServer', {
                    server: buildServer(c.host, c.port),
                    username: c.user || '',
                    password: c.pass || ''
                }, function (res) { if (done) done(res); });
            });
        }

        // --------------------------------------------------------------- rendering
        function formatTime(sec) {
            if (!sec || sec < 0) { return '0:00'; }
            var s = Math.floor(sec);
            return Math.floor(s / 60) + ':' + ('0' + (s % 60)).slice(-2);
        }

        function updateTheme(url) {
            if (!url) { return; }
            var img = new Image();
            img.crossOrigin = 'Anonymous';
            img.src = url;
            img.onload = function () {
                try {
                    var v = new Vibrant(img);
                    var sw = v.swatches();
                    var color = sw['Vibrant'] || sw['LightVibrant'] || sw['Muted'];
                    if (color) { document.documentElement.style.setProperty('--accent', color.getHex()); }
                } catch (e) {}
            };
        }

        var CONN = {
            idle:       { cls: '',     text: 'Not configured' },
            connecting: { cls: 'warn', text: 'Connecting…' },
            buffering:  { cls: 'warn', text: 'Buffering…' },
            playing:    { cls: 'ok',   text: 'Connected' },
            paused:     { cls: 'ok',   text: 'Connected' },
            error:      { cls: 'err',  text: 'Error' }
        };

        function serverHost(server) {
            if (!server) { return ''; }
            try { return new URL(server.indexOf('://') >= 0 ? server : 'http://' + server).host; }
            catch (e) { return server; }
        }

        function renderStatus(st) {
            if (!st) { return; }
            lastStatus = st;
            if (st.configUrl) {
                var lu = document.getElementById('lan-url');
                if (lu) { lu.textContent = st.configUrl; }
            }

            // If the setup overlay was auto-shown because nothing was configured and
            // the service is now configured (e.g. set from the LAN page), dismiss it
            // so it stops covering the playing content.
            if (autoOpened && st.server && setupOverlay.style.display === 'flex') {
                closeSettings();
            }

            var host = serverHost(st.server);
            var meta = CONN[st.status] || CONN.idle;
            connPill.className = (st.connected ? 'ok' : meta.cls);
            connText.textContent = st.error ? ('Error: ' + st.error).slice(0, 60)
                                 : st.connected ? ('Connected · ' + host)
                                 : host ? (meta.text + ' · ' + host)
                                 : meta.text;

            var t = st.track || {};
            titleEl.textContent = t.title || 'Ready';
            artistEl.textContent = t.artist || (st.playerName || 'Sendspin Cinema');

            if (t.artwork && t.artwork !== lastArt) {
                lastArt = t.artwork;
                coverEl.src = t.artwork;
                bgEl.style.backgroundImage = "url('" + t.artwork + "')";
                coverEl.style.display = 'block';
                loaderEl.style.display = 'none';
                updateTheme(t.artwork);
            } else if (!t.artwork) {
                coverEl.style.display = 'none';
                loaderEl.style.display = 'flex';
                lastArt = null;
            }

            if (t.duration) {
                timeTotal.textContent = formatTime(t.duration);
                timeCurrent.textContent = formatTime(t.position || 0);
                progressBar.style.width = Math.max(0, Math.min(100, (t.position || 0) / t.duration * 100)) + '%';
            } else {
                timeTotal.textContent = '0:00';
                timeCurrent.textContent = '0:00';
                progressBar.style.width = '0%';
            }

            isPlaying = (st.status === 'playing');
            playPath.setAttribute('d', isPlaying ? 'M6 19h4V5H6v14zm8-14v14h4V5h-4z' : 'M8 5v14l11-7z');
        }

        // ------------------------------------------------------------ status sub
        function subscribeStatus() {
            statusBridge = lunaCall('status', { subscribe: true }, function (res) {
                if (res && res.state) {
                    renderStatus(res.state);
                    // First snapshot decides whether to show setup: only if nothing is
                    // configured here OR on the service (so a LAN-page setup is honored).
                    if (!decidedInitial) {
                        decidedInitial = true;
                        if (!hasCfg() && !res.state.server) { openSettings(true); }
                    }
                }
            });
        }

        // ----------------------------------------------- remote (D-pad) focus nav
        // webOS WAM does no automatic spatial navigation, and arrow keys inside a
        // text field only move the caret — so without this you can't move between
        // fields with the remote. Up/Down walk a live list of the overlay's
        // focusable controls; Enter activates a scanned-server tile (a div).
        function focusables() {
            if (setupOverlay.style.display !== 'flex') { return []; }
            var nodes = setupOverlay.querySelectorAll('button, input, .srv-item');
            var out = [];
            for (var i = 0; i < nodes.length; i++) {
                if (nodes[i].offsetParent !== null && !nodes[i].disabled) { out.push(nodes[i]); }
            }
            return out;
        }
        function refreshFocusRing() { /* focusables() is computed live; nothing to cache */ }
        function moveFocus(dir) {
            var els = focusables();
            if (!els.length) { return; }
            var i = els.indexOf(document.activeElement);
            if (i === -1) { els[0].focus(); return; }
            els[Math.max(0, Math.min(els.length - 1, i + dir))].focus();
        }

        // ----------------------------------------------------------------- chrome
        function showUI() {
            document.getElementById('main-body').classList.add('show-ui');
            clearTimeout(uiTimeout);
            uiTimeout = setTimeout(function () {
                if (isPlaying) { document.getElementById('main-body').classList.remove('show-ui'); }
            }, 5000);
        }
        window.addEventListener('mousemove', showUI);
        window.addEventListener('keydown', function (e) {
            showUI();
            if (setupOverlay.style.display !== 'flex') { return; }
            var k = e.key, kc = e.keyCode;
            if (k === 'ArrowDown' || kc === 40) { e.preventDefault(); moveFocus(1); return; }
            if (k === 'ArrowUp' || kc === 38) { e.preventDefault(); moveFocus(-1); return; }
            if ((k === 'Enter' || kc === 13) &&
                document.activeElement && document.activeElement.classList.contains('srv-item')) {
                e.preventDefault(); document.activeElement.click(); return;
            }
            if (k === 'Backspace' || k === 'Escape' || k === 'GoBack' || kc === 461 || kc === 27) {
                if (hasCfg()) { e.preventDefault(); closeSettings(); }
            }
        });

        document.getElementById('play-btn').onclick = function () { lunaCall(isPlaying ? 'pause' : 'play', {}); };
        document.getElementById('prev-btn').onclick = function () { lunaCall('previous', {}); };
        document.getElementById('next-btn').onclick = function () { lunaCall('next', {}); };

        // -------------------------------------------------------------------- init
        (function init() {
            subscribeStatus();
            if (hasCfg()) {
                applyConfig(); // re-push saved config so a recycled service reconnects
            }
            // Whether to show setup is decided when the first status arrives (so a
            // config set from the LAN page is honored). Fallback: if no status comes
            // back at all (e.g. no Luna bridge) and nothing is saved, show setup.
            setTimeout(function () {
                if (!decidedInitial) {
                    decidedInitial = true;
                    if (!hasCfg()) { openSettings(true); }
                }
            }, 2500);
        })();
    </script>
</body>
</html>
